[entity-description]
acidworking-plant=Позволяет использовать более продвинутую обработку кислоты. Эта машина производит кислоты на Мурии, а также разрушает расположенные рядом объекты посредством коррозии.
smelting-plant=Смесь литейной и печи. Подходит для обработки свинца. Эта машина позволяет производить кислоты на Мурии, а так же разрушает расположенные рядом объекты посредством коррозии.
fungicultural-tower=Модифицированная для выращивания грибка и лишайника сельскохозяйственная башня.
acidthrower-turret=В отличие от огнеметной турели, эта кислотная боевая машина расплавит ваших врагов.
metallic-lichen-colony=Колония кислотолюбивых бактерий, растущая на солях хлора.
cotunnite-lichen-colony=Колония кислотолюбивых бактерий, растущая на коттуните.
holmium-lichen-colony=Колония кислотолюбивых бактерий, растущая на хлориде гольмия.
eschatotaxite=Возвышающиеся колонии грибков, потребляющие коррозионные кислоты в воздухе.
chlorine-salt-deposit=Залежи солей хлора.
biovat=Видоизменённая биокамера, использующая эшатотаксит для производства материалов, вместо недоразвитых пятиногов. Менее эффективна, но может быть изготовлена из местных мурианских материалов.
big-chloric-rock=Большое скопление солей хлора и камня.

