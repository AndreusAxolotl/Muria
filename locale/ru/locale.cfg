[tips-and-tricks-item-description]
muria-briefing=[planet=muria] - это высокотоксичный мир, наполненный жизнью. [tile=acidophile-lichen] и [entity=eschatotaxite] грибы покрывают высушенные земли планеты, в то время как остальную поверхность покрывают озера [fluid=muriatic-solution]. [entity=chlorine-salt-deposit] и [item=cotunnite] - это соли [fluid=chlorine], которые можно найти в разных частях планеты. Оба могут быть очищены в руду через [entity=fungicultural-tower] и лишайников. Остерегайтесь коррозирующих миазмов, выпущенных лишайниками. Эшатотакситы могут помочь защитить ваш завод от них.
acid-immunity-list=Сбор [entity=metallic-lichen-colony] и  [entity=cotunnite-lichen-colony] приведёт к выделению коррозионных газов, которые наносят урон большинству ваших машин. На карте с наложением слоя загрязнения показано, какие области будут опасны для ваших машин. Уровень коррозионной атмосферы можно снизить путём посадки и сбора [entity=eschatotaxite]. \nБольшинство созданных игроком объектов на загрязнённых участках на [planet=muria] будут постоянно получать урон от коррозионных кислот, за некоторыми исключениями. \nИммунными являются: \n [entity=acidworking-plant] и  [entity=smelting-plant] (эти два устройства фактически увеличивают количество коррозионных кислот, так что будьте осторожны), \n - [entity=biovat] (биоват будет поглощать некоторое количество кислот из воздуха), \n- все энергетические объекты (энергетические столбы, генераторы и аккумуляторы), \n-[entity=burner-inserter], [entity=inserter], [entity=long-handed-inserter], [entity=transport-belt], [entity=fast-transport-belt], [entity=underground-belt] and [entity=fast-underground-belt] — это единственные логистические объекты, которые можно использовать в загрязнённых зонах. \n- Роботы будут получать урон, но робопорты — нет. \nПоезда ([entity=locomotive], [item=rail], etc.) также невосприимчивы. \n- Иммунными являются также [entity=rocket-silo], [entity=cargo-landing-pad] and [entity=cargo-bay], \n- все буровые установки, \n[entity=beacon] \n и все трубы.

