[technology-description]
planet-discovery-muria=Дальняя планета, тепло на которой поддерживается сильным парниковым эффектом. Испарения газов от мелких озер обладают высокой коррозионной активностью [fluid=muriatic-solution]. Кажется, на поверхности есть жизнь.
lichen-cultivation=Похоже, что [item=acidophile-lichen], поглощают энергию, выделяющуюся из [item=chlorine-salts] когда [fluid=chlorine] дегалогенируется из молекул солей металлов. Надежным способом получения металлов на этой планете является размещение соли на [tile=acidophile-lichen]. Колонии этих организмов высвобождают в воздух черезвычайно мощные окислители, что создает опасность для завода.
eschatotaxite-farming=Высокие колонии грибов, питающиеся гниющими частями других колоний. Чрезвычайно насыщены углеродом и серой. Они потребляют коррозионные кислоты, выпущенные [entity=metallic-lichen-colony] и [entity=cotunnite-lichen-colony].
lead-processing=Поместите [item=cotunnite], извлеченный из fluid=muriatic-solution], на [tile=acidophile-lichen], чтобы извлечь [item=lead] из породы и начать обработку этого устойчивого к коррозии металла.
acidworking=Новые пути обработки очень агрессивных материалов [entity=acidworking-plant] требуют [item=chloric-fuel] для работы.
advanced-lead-processing=Посредством [item=chloric-fuel] можно начать продвинутую цепь обработки [item=lead] внутри специализированного [entity=smelting-plant]. Наряду с этим, откроет такие материалы как свинцовые гранулы и утяжеленную дробь.
muriatic-science-pack=Позволяет работать с продвинутыми кислотными и токсичными материалами.
offworld-chlorane-production=Процессы получения и обработки [fluid=chlorane] за пределами [planet=muria].
toxic-rounds-magazine=Пули, начиненные кислотами.
chlorane-explosives=Альтернативный рецепт [item=explosives] с использованием свойств [fluid=chlorane].
chlorane-lead-battery=Альтернативный рецепт [item=battery] с использованием [item=lead-plate].
acid-weaponization=Начните создавать продвинутый химический арсенал.
refined-acid-weaponry=Увеличивает урон кислотного оружия.
hydronium-destruction-productivity=Более современные методы разрушения [fluid=hydronium] позволяют восстановить больше молекул [fluid=oxygen] и [fluid=водород].
oxygenated-bacteria-cultivation=Добавляя кислород в среду выращивания бактерий, повышается эффективность инкубации бактерий.
holmium-chloride=Более эффективное исследование солей хлора позволяет искусственно синтезировать хлорид гольмия для расширения цепочки производства и увеличения количества гольмия, производимого на Фульгоре. Наряду с этим, становится возможным искусственно культивировать колонии лишайников, способные выживать на нефтяном океане Фульгоры и в самых глубоких Мурианских озерах.
shotgun-turret=Изменённая пулемётная турель, способная стрелять тяжелой дробью.
advanced-paste-applications=При использовании многих свойств эшатотакситовой пасты можно изменить цепочку производства, заменив пластик и пюре юмако в важных рецептах.
shotgun-turret-damage=Увеличение урона осколочной турели.
murian-oil-processing=Перерабатывая серу и эшатотакситовую пасту, выделяемую грибками эшатотаксита, с использованием других мурианских ресурсов, становится легко получить нефть и другие нефтепродукты.
leaded-fuel=Используя свинцовые гранулы, можно получить альтернативу ракетному топливу с невероятным улучшением ускорения транспорта, пожертвовав чистотой окружающей среды.

