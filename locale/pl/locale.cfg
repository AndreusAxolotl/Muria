[item-description]
acidophile-lichen=Formy życia podobne do porostów, oparte na krzemie, które do przeżycia potrzebują soli chloru.
artificial-lichen-colony=Podłoże do uprawy porostów kwasolubnych. Można umieścić na [tile=muriatic-solution] planety [planet=muria] oraz na Oceanie Naftowym planety [planet=fulgora].
chlorine-salts=Mieszanka chlorków żelaza i miedzi. Można umieścić na [tile=acidophile-lichen].
cotunnite=Kawałek chlorku ołowiu. Można umieścić na [tile=acidophile-lichen].
chloric-fuel=Uwięziony okaz porostu kwasolubnego, energia uwalniana w wyniku jego specyficznej syntezy energetycznej jest wykorzystywana do zasilania specjalistycznych maszyn Murii.
eschatotaxite-sprout=Młody grzyb eschatotaksytu. Można go zasadzić na wszystkich ciemnych płytkach na [planet=muria].
eschatotaxite-paste=Naturalny klej bogaty w węgiel. Chociaż smakuje jak węgiel drzewny, jest bardzo pożywny.
acidthrower=Zmodyfikowany miotacz ognia zawierający genetycznie zmodyfikowany ropylacz.
holmium-chloride=Sztucznie wywołany kawałek chlorku holmu. Można umieścić na [tile=artificial-lichen-colony] na [planet=fulgora].
leaded-fuel=Silnie zanieczyszczające i potężne paliwo.

