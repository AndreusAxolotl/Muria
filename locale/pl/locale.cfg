[tips-and-tricks-item-description]
muria-briefing=[planet=muria] to wysoce toksyczny świat, bogaty w życie. Grzyby [tile=acidophile-lichen] i [entity=eschatotaxite] pokrywają suche tereny planety, podczas gdy jeziora [fluid=muriatic-solution] pokrywają resztę powierzchni. [entity=chlorine-salt-deposit] i [item=cotunnite] to sole [fluid=chlorine], które można znaleźć na powierzchni na różne sposoby. Oba można oczyścić do postaci rud za pomocą [entity=fungicultural-tower] i porostów. Uważaj na żrące powietrze uwalniane przez porosty. Eschatotaksyty mogą chronić twoją fabrykę przed uszkodzeniami.
[planet-effect-alert]
muria-corrosive-effect-destroyed-entity=Maszyna została zniszczona przez żrące powietrze Murii. Fragmenty skażone na Murii będą uszkadzać większość twoich maszyn. Więcej informacji znajdziesz w sekcji „Porady i wskazówki”.

