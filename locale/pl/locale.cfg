chlorane-oxidation=Utlenianie chloranu w celu uzyskania chloru i wody.
polyvinyl-chloride=Alternatywna receptura tworzywa sztucznego.
hydrogenated-oil-processing=Jeszcze bardziej zaawansowana metoda przetwarzania oleju. Wykorzystuje wodór jako katalizator w celu maksymalizacji wydajności.
kerolox-rocket-fuel=Przepis na paliwo rakietowe wykorzystujący właściwości utleniające tlenu.
eschatotaxite-low-density-structure=Alternatywny przepis na struktury niskiej gęstości.
eschatotaxite-carbon-fiber=Alternatywny przepis na włókno węglowe.

