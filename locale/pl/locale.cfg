[entity-description]
acidworking-plant=Umożliwia bardziej zaawansowaną obróbkę kwasem. Ta maszyna będzie wytwarzać kwasy na Murii i powodować korozję wrażliwych obiektów w pobliżu.
smelting-plant=Połączenie odlewni i pieca. Umożliwia obróbkę ołowiu. Ta maszyna będzie wytwarzać kwasy na Murii i powodować korozję wrażliwych obiektów w pobliżu.
fungicultural-tower=Zmodyfikowana wieża rolnicza przeznaczona do uprawy grzybów i porostów.
acidthrower-turret=Podobnie jak wieżyczka miotająca ogień, ta napędzana kwasem machina wojenna stopi twoich przeciwników.
metallic-lichen-colony=Kolonia porostów kwasolubnych rosnących na solach chloru.
cotunnite-lichen-colony=Kolonia porostów kwasolubnych rosnących na kotunicie.
holmium-lichen-colony=Kolonia porostów kwasolubnych rosnących na chlorku holmu.
eschatotaxite=Wysoka kolonia grzybów, która pochłania żrące kwasy z powietrza.
chlorine-salt-deposit=Złoże soli chloru.
biovat=Biokomora zmodyfikowana tak, by wykorzystywać eschatotaksyty do przetwarzania materiałów zamiast niedojrzałych pięcionogów. Mniej skuteczna, ale można ją stworzyć przy użyciu lokalnych zasobów Muria.
big-chloric-rock=Duża skała złożona z soli chloru i kamienia.

