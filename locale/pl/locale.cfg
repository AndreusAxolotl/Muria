[technology-description]
planet-discovery-muria=Odległa planeta o silnym efekcie cieplarnianym. Płytkie jeziora zawierające wysoce korozyjny [fluid=muriatic-solution] wydzielają gazy, które utrzymują ciepło na planecie. Płyn z jezior można wydobywać za pomocą [entity=offshore-pump]. Wydaje się, że na powierzchni istnieje życie.
lichen-cultivation=Wygląda na to, że [item=acidophile-lichen] odżywiają się energią uwalnianą przez [item=chlorine-salts] podczas usuwania [fluid=chlorine] z metali. Umieszczając sole na [tile=acidophile-lichen] możemy w niezawodny sposób pozyskiwać metale na tej planecie. Ich kolonie wydają się uwalniać do powietrza niezwykle silne substancje żrące, co stanowi zagrożenie dla fabryki.
eschatotaxite-farming=Wysokie kolonie grzybów, które żywią się własnymi gnijącymi częściami. Niezwykle bogate w węgiel i siarkę. Wydaje się, że pochłaniają one żrące kwasy uwalniane przez [entity=metallic-lichen-colony] i [entity=cotunnite-lichen-colony].
lead-processing=Umieść [item=cotunnite] wydobyty z [fluid=muriatic-solution] na [tile=acidophile-lichen] aby uwolnić zawarty w nim [item=lead] i rozpocząć przetwarzanie tego odpornego na korozję metalu.
acidworking=Nowe procesy umożliwiające obróbkę materiałów silnie korozyjnych. [entity=acidworking-plant] wymaga do działania [item=chloric-fuel].
advanced-lead-processing=Dzięki [item=chloric-fuel] możemy uruchomić bardziej zaawansowany łańcuch przetwórczy [item=lead] w specjalistycznej [entity=smelting-plant]. Równolegle należy opracować śrut ołowiany i ciężkie naboje do strzelb.
offworld-chlorane-production=Procesy pozyskiwania i przetwarzania [fluid=chlorane] poza [planet=muria].
toxic-rounds-magazine=Kule zmodyfikowane tak, aby zawierały ładunki kwasowe.
chlorane-explosives=Alternatywna receptura na [item=explosives], wykorzystująca właściwości [fluid=chlorane].
chlorane-lead-battery=Alternatywna receptura na [item=battery], wykorzystująca [item=lead-plate].
acid-weaponization=Rozpocznij budowę zaawansowanego arsenału chemicznego.
refined-acid-weaponry=Zwiększa obrażenia zadawane przez broń kwasową.
hydronium-destruction-productivity=Bardziej zaawansowane techniki niszczenia [fluid=hydronium] pozwalają na odzyskanie większej ilości cząsteczek [fluid=oxygen] i [fluid=hydrogen].
oxygenated-bacteria-cultivation=Dodając tlen do środowiska hodowli bakterii, możemy zwiększyć wydajność hodowli.
holmium-chloride=Lepsze badania nad solami chloru pozwalają nam sztucznie syntetyzować chlorowodorek holmu, aby rozszerzyć łańcuch przetwarzania holmu i zwiększyć ilość holmu, którą produkujemy na Fulgorze. Oprócz tego zyskujemy możliwość sztucznego tworzenia kolonii porostów, zdolnych do życia na olejowym oceanie Fulgory oraz w głębszych częściach jezior solnych Murii.
shotgun-turret=Zmodyfikowana konstrukcja wieżyczki umożliwiająca oddawanie potężnych strzałów ze strzelby.
advanced-paste-applications=Wykorzystując liczne właściwości pasty z eschatotaksytu, możemy zastąpić tworzywa sztuczne i papkę pychotki w kluczowych procesach.
shotgun-turret-damage=Zwiększone obrażenia z wieżyczki ze strzelbą.
murian-oil-processing=Przetwarzając siarkę i pastę eschatotaksytową pochodzącą z grzybów eschatotaksytowych wraz z innymi surowcami z Murii, możemy łatwo uzyskać ropę i inne produkty ropopochodne.
leaded-fuel=Wykorzystując śrut ołowiany, możemy stworzyć alternatywę dla paliwa rakietowego o niesamowitych modyfikatorach prędkości, ale powodującą ogromne zanieczyszczenie środowiska.

